name: Lint And Quality Checks

on:
    pull_request:
        paths:
            - "src/uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "pyproject.toml"
            - "environment.yml"
    push:
        branches:
            - main
        paths:
            - "src/uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "pyproject.toml"
            - "environment.yml"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: lint-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    python-lint:
        name: Ruff + Syntax Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "0.11.25"

            - name: Ruff lint
              run: uvx ruff@0.15.20 check --output-format=github tests src

            - name: Ruff format check
              run: uvx ruff@0.15.20 format --check tests src

            - name: Python syntax smoke test
              run: uv run --no-project --python 3.12 python -m compileall -q src tests

    workflow-lint:
        name: GitHub Workflow Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Validate workflow files
              uses: reviewdog/action-actionlint@v1
