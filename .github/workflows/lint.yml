name: Lint And Quality Checks

on:
    pull_request:
        paths:
            - "src/uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "pyproject.toml"
            - "environment.yml"
    push:
        branches:
            - main
        paths:
            - "src/uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "pyproject.toml"
            - "environment.yml"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: lint-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    python-lint:
        name: Ruff + Syntax Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.14"
                  cache: "pip"

            - name: Install lint dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ruff==0.15.7

            - name: Ruff lint
              run: ruff check tests src

            - name: Ruff format check
              run: ruff format --check tests src

            - name: Python syntax smoke test
              run: python -m compileall -q src tests

    workflow-lint:
        name: GitHub Workflow Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate workflow files
              uses: reviewdog/action-actionlint@v1
