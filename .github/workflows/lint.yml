name: Lint And Quality Checks

"on":
    pull_request:
        paths:
            - "uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "ruff.toml"
            - "requirements.txt"
            - "pytest.ini"
    push:
        branches:
            - main
        paths:
            - "uconf/**/*.py"
            - "tests/**/*.py"
            - ".github/workflows/*.yml"
            - ".github/workflows/*.yaml"
            - "ruff.toml"
            - "requirements.txt"
            - "pytest.ini"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: lint-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    python-lint:
        name: Ruff + Syntax Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Setup Conda and Create Environment
              uses: conda-incubator/setup-miniconda@v3
              with:
                  activate-environment: sage
                  channel-priority: strict
                  environment-file: environment.yml

            - name: Install lint dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ruff==0.12.8

            - name: Ruff lint
              run: ruff check .

            - name: Ruff format check
              run: ruff format --check .

            - name: Python syntax smoke test
              run: python -m compileall -q uconf tests

    workflow-lint:
        name: GitHub Workflow Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate workflow files
              uses: reviewdog/action-actionlint@v1
