name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # IMPORTANT: This job name MUST be exactly "copilot-setup-steps"
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install SageMath
              run: |
                  sudo apt-get update
                  sudo apt-get install -y sagemath

            - name: Verify SageMath Installation
              run: sage --version
