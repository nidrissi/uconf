name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Conda and Create Environment
              uses: conda-incubator/setup-miniconda@v3
              with:
                  miniforge-version: latest
                  activate-environment: sage
                  python-version: "3.11"
                  channels: conda-forge,nodefaults

            # The `bash -el {0}` shell is strictly required for Conda commands
            # to execute properly inside GitHub Actions/Copilot environments!
            - name: Install SageMath
              shell: bash -el {0}
              run: |
                  conda install sage

            - name: Verify SageMath Installation
              shell: bash -el {0}
              run: sage --version
